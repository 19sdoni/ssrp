<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SS-RP Chatlog Parser</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
:root{
    --bg1:#ffffff;
    --bg2:#f3f4f6;
    --card:rgba(255,255,255,.92);
    --line:rgba(17,24,39,.12);
    --text:#111827;
    --muted:#6b7280;
}

body{
    min-height:100vh;
    background: linear-gradient(180deg, #ffffff 0%, #f3f4f6 100%);
    color: var(--text);
    overflow-x:hidden;
}

.bg-glow{
    position:fixed;
    width:700px;
    height:700px;
    left:50%;
    top:6%;
    transform:translateX(-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(17,24,39,.06), rgba(17,24,39,0));
    filter:blur(80px);
    pointer-events:none;
    z-index:0;
    opacity:.75;
}

.wrapper{
    position:relative;
    z-index:1;
    max-width:1280px;
    margin:0 auto;
    padding:30px;
}

.card{
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(248,250,252,.96));
    border:1px solid rgba(17,24,39,.10);
    border-radius:24px;
    box-shadow:0 14px 40px rgba(17,24,39,.08);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
}

.header{
    padding:30px 24px;
    text-align:center;
    margin-bottom:26px;
    position:relative;
    overflow:hidden;
}

.brand-wrap{
    position:relative;
    display:inline-block;
    margin-bottom:6px;
}

.brand-icon{
    position:absolute;
    top:50%;
    left:50%;
    width:420px;
    transform:translate(-50%,-50%);
    opacity:.50;
    filter:grayscale(100%) blur(.4px);
    pointer-events:none;
    user-select:none;
    z-index:0;
}

.title{
    position:relative;
    z-index:1;
    font-size:3rem;
    line-height:1;
    font-weight:900;
    letter-spacing:-2px;
    background:none;
    -webkit-background-clip:initial;
    background-clip:initial;
    color:#111827;
    -webkit-text-fill-color:initial;
}

.subtitle{
    margin-top:8px;
    font-size:1rem;
    font-weight:600;
    color:#6b7280;
    letter-spacing:1px;
}

.back-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin-top:14px;
    padding:10px 18px;
    border-radius:12px;
    border:1px solid rgba(17,24,39,.12);
    text-decoration:none;
    color:#111827;
    background:#ffffff;
    transition:.25s ease;
    font-weight:600;
}

.back-btn:hover{
    transform:translateY(-2px);
    background:#f8fafc;
    border-color:rgba(17,24,39,.18);
}

.grid{
    display:grid;
    grid-template-columns:340px 1fr;
    gap:20px;
    align-items:start;
}

.panel{
    padding:18px;
}

.section-title{
    font-size:1.05rem;
    font-weight:800;
    color:#111827;
    margin-bottom:14px;
    letter-spacing:.2px;
}

.check-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    font-size:.95rem;
    color:#111827;
}

.check-row input{
    width:18px;
    height:18px;
    accent-color:#111827;
}

hr{
    border:none;
    border-top:1px solid rgba(17,24,39,.08);
    margin:12px 0;
}

.btns{
    display:flex;
    gap:12px;
    margin-top:16px;
    flex-wrap:wrap;
}

button{
    border:1px solid rgba(17,24,39,.14);
    border-radius:16px;
    padding:12px 16px;
    font-weight:800;
    cursor:pointer;
    transition:.25s ease;
    background:#ffffff;
    color:#111827;
}

button:hover{
    transform:translateY(-2px);
    background:#f8fafc;
}

.btn.primary{
    background:linear-gradient(180deg, #9ca3af, #6b7280);
    color:#ffffff;
    border-color:rgba(17,24,39,.10);
    box-shadow:0 10px 24px rgba(17,24,39,.12);
}

.btn.primary:hover{
    background:linear-gradient(180deg, #a8b0bb, #7a8290);
}

.btn.secondary{
    background:#ffffff;
    color:#111827;
}

.btn.secondary:hover{
    background:#f8fafc;
}

textarea{
    width:100%;
    min-height:260px;
    resize:vertical;
    border:1px solid rgba(17,24,39,.16);
    border-radius:18px;
    padding:16px;
    background:#ffffff;
    outline:none;
    font-size:.95rem;
    line-height:1.55;
    color:#111827;
}

textarea:focus{
    border-color:rgba(17,24,39,.26);
    box-shadow:0 0 0 3px rgba(17,24,39,.06);
}

.split{
    display:grid;
    grid-template-columns:1fr;
    gap:16px;
}

.hint{
    font-size:.86rem;
    color:#6b7280;
    margin-top:10px;
    line-height:1.5;
}

@media (max-width: 920px){
    .grid{ grid-template-columns:1fr; }
    .title{ font-size:2.2rem; }
    .brand-icon{ width:300px; }
}
</style>

</head>
<body>
<div class="bg-glow"></div>
<div class="wrapper">
    
    <div class="header card">
        <div class="brand-wrap">
            <img src="icon.png" alt="Logo" class="brand-icon">
            <div class="title">CHATLOG PARSER</div>
        </div>
        <div class="subtitle">Tools by Tiger Year Crew, feel free to use!</div>
        <a href="index.html" class="back-btn">← Back to Tools</a>
    </div>


    <div class="grid">
        <div class="card panel">
            <div class="section-title">Parser Settings</div>

            <div class="check-row">
                <input type="checkbox" id="all" checked>
                <label for="all"><b>Check / Uncheck All</b></label>
            </div>

            <hr style="border:none;border-top:1px solid rgba(0,0,0,.08);margin:12px 0;">

            <div class="check-row"><input type="checkbox" class="opt" id="timestamps" checked><label for="timestamps">Timestamp</label></div>
            <div class="check-row"><input type="checkbox" class="opt" id="ads" checked><label for="ads">Advertisement</label></div>
            <div class="check-row"><input type="checkbox" class="opt" id="admin" checked><label for="admin">Admin log</label></div>
            <div class="check-row"><input type="checkbox" class="opt" id="ooc" checked><label for="ooc">OOC text</label></div>

            <div class="btns">
                <button class="btn secondary" id="parseBtn" type="button">Parse chatlog</button>
                <button class="btn secondary" id="clearBtn" type="button">Clear</button>
            </div>

            <div class="hint">
Paste your chatlog into the text area below and click "Parse chatlog" to remove unwanted lines.
            </div>
        </div>

        <div class="split">
            <div class="card panel">
                <div class="section-title">Original Chatlog</div>
                <textarea id="input" placeholder="Paste your chatlog here..."></textarea>
            </div>

            <div class="card panel">
                <div class="section-title">Parsed Chatlog</div>
                <textarea id="output" placeholder="Parsed chatlog will appear here..." readonly></textarea>
            </div>
        </div>
    </div>
</div>

<script>
const all = document.getElementById('all');
const opts = [...document.querySelectorAll('.opt')];
const input = document.getElementById('input');
const output = document.getElementById('output');

all.addEventListener('change', () => {
    opts.forEach(cb => cb.checked = all.checked);
});

opts.forEach(cb => cb.addEventListener('change', () => {
    all.checked = opts.every(x => x.checked);
}));

document.getElementById('clearBtn').addEventListener('click', () => {
    input.value = '';
    output.value = '';
});

function stripTimestamp(line) {
    return line.replace(/^\[\d{1,2}:\d{2}(?::\d{2})?\]\s*/, '');
}

function isAdLine(line) {
    return /\{90EE90\}/i.test(line)
        || /(?:^|\s)Ad:/i.test(line)
        || /(?:^|\s)Contact:/i.test(line)
        || /Contact\s*Info/i.test(line);
}

function isAdminLine(line) {
    return /(?:^|\s)AdmCmd:/i.test(line) || /(?:^|\s)reason:/i.test(line);
}

function isOOCLine(line) {
    return /\bPM\b/i.test(line) || /\(\(.*\)\)/.test(line) || /\bOOC\b/i.test(line);
}

document.getElementById('parseBtn').addEventListener('click', () => {
    const lines = input.value.split(/\r?\n/).filter(Boolean);
    const result = [];

    const settings = {
        timestamps: document.getElementById('timestamps').checked,
        ads: document.getElementById('ads').checked,
        admin: document.getElementById('admin').checked,
        ooc: document.getElementById('ooc').checked
    };

    for (let line of lines) {
        line = line.trim();
        if (!line) continue;

        if (settings.timestamps) {
            line = stripTimestamp(line).trim();
        }

        if (!line) continue;

        if (settings.ads && isAdLine(line)) continue;
        if (settings.admin && isAdminLine(line)) continue;
        if (settings.ooc && isOOCLine(line)) continue;

        result.push(line);
    }

    output.value = result.join('\n');
});
</script>
</body>
</html>
